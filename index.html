<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>For Punam 🎂</title>

<!-- 🔥 Google Font -->
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

<link rel="stylesheet" href="style.css">
</head>

<body>

<audio id="bgMusic" loop>
  <source src="music.mp3" type="audio/mpeg">
</audio>

<!-- Start Screen -->
<div id="startScreen">
  <h2 id="startText">Tap to Start 🎁</h2>
  <h1 id="countdown"></h1>
</div>
<!-- Slide 1 -->
<div id="slide1" class="slide">
  <div class="cover">
    <div class="left"></div>
    <div class="right"></div>
    <div class="ribbon-center"></div>
  </div>
  <h1 class="main-text">It’s 14th April… Madam ji ka birthday 🎂</h1>
</div>

<!-- Slide 2 -->
<div id="slide2" class="slide hidden">
  <h2>Let’s celebrate together 🎉</h2>
  <div class="cake" onclick="cutCake()">🎂</div>
</div>

<!-- Slide 3 -->
<div id="slide3" class="slide hidden">
  <h2>Recap our memories 📸</h2>
  <div class="photo-box">
    <img id="slideshow" src="images/img1.jpg">
  </div>
  <h3 id="photoText"></h3>
</div>

<!-- Slide 4 -->
<div id="slide4" class="slide hidden">
  <h2 id="typeText"></h2>
  <button onclick="location.reload()" class="replay-btn">Watch Again 🔁</button>
</div>

<script src="script.js"></script>
</body>
</html>
